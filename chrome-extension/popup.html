<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 340px; font-family: -apple-system, system-ui, sans-serif; background: #0a0a0f; color: #f1f5f9; padding: 20px; }
        h2 { font-size: 1rem; margin-bottom: 4px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status { font-size: 0.75rem; color: #64748b; margin-bottom: 16px; }
        .status span { color: #22c55e; }
        .status.offline span { color: #ef4444; }
        
        textarea { width: 100%; height: 80px; background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; color: #f1f5f9; padding: 10px; font-size: 0.8rem; resize: none; margin-bottom: 8px; }
        
        .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .tool-btn { background: #0f172a; border: 1px solid #1e293b; color: #f1f5f9; padding: 10px 8px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; text-align: center; transition: all 0.2s; }
        .tool-btn:hover { border-color: #6366f1; background: #1e1b4b; }
        .tool-btn.primary { background: #6366f1; border-color: #6366f1; font-weight: 600; }
        
        .result { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 10px; font-size: 0.8rem; min-height: 60px; max-height: 150px; overflow-y: auto; white-space: pre-wrap; color: #94a3b8; }
        .result.success { color: #22c55e; border-color: #22c55e; }
        
        .footer { margin-top: 12px; font-size: 0.7rem; color: #475569; text-align: center; }
        .footer a { color: #6366f1; text-decoration: none; }
        
        .copied { color: #22c55e; font-size: 0.75rem; text-align: center; margin-top: 4px; display: none; }
    </style>
</head>
<body>
    <h2>Privacy Shield 🛡️</h2>
    <div class="status" id="apiStatus">API: <span>Checking...</span></div>
    
    <textarea id="inputText" placeholder="Paste text here, or select text on any page and click a tool..."></textarea>
    
    <div class="tools">
        <button class="tool-btn primary" id="btnClean">🧹 Clean PII</button>
        <button class="tool-btn" id="btnCheck">🔍 Check Risk</button>
        <button class="tool-btn" id="btnSummarize">📝 Summarize</button>
        <button class="tool-btn" id="btnRedact">📄 Redact</button>
    </div>
    
    <div class="result" id="result">Results appear here...</div>
    <div class="copied" id="copied">✅ Copied to clipboard!</div>
    
    <div class="footer">
        Powered by <a href="http://localhost:8000" target="_blank">PrivacyAI Toolkit</a><br>
        Select text on any page → right-click for quick actions
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
